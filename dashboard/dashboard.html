<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ok: #22c55e; --ok-bg: rgba(34,197,94,0.12);
  --warn: #f59e0b; --warn-bg: rgba(245,158,11,0.12);
  --crit: #ef4444; --crit-bg: rgba(239,68,68,0.12);
  --off: #6b7280; --off-bg: rgba(107,114,128,0.12);
  --stale: #8b5cf6; --stale-bg: rgba(139,92,246,0.12);

  --codex: #06b6d4; --codex-m: rgba(6,182,212,0.15); --codex-d: rgba(6,182,212,0.3);
  --kimi: #f97316; --kimi-m: rgba(249,115,22,0.15); --kimi-d: rgba(249,115,22,0.3);
  --claude: #d4a06e; --claude-m: rgba(212,160,110,0.15); --claude-d: rgba(212,160,110,0.3);
  --zai: #a855f7; --zai-m: rgba(168,85,247,0.15); --zai-d: rgba(168,85,247,0.3);

  --base: #0c0e12; --card: #13161c; --card-h: #181c24;
  --elevated: #1e2330; --bar-track: #1a1e28;
  --border: rgba(255,255,255,0.06); --border-s: rgba(255,255,255,0.03);

  --t1: #e8eaed; --t2: #9ca3af; --t3: #6b7280; --t4: #4b5563;
  --mono: 'JetBrains Mono','SF Mono','Fira Code',monospace;
  --body: 'DM Sans','Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{min-height:100vh;background:var(--base);color:var(--t1);font-family:var(--body)}

/* Background grid */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:48px 48px}

.container{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:0 24px}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:24px 0 20px;
  border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.hdr-left{display:flex;align-items:center;gap:16px}
.logo{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(6,182,212,.3),rgba(168,85,247,.3));
  border:1px solid var(--border);font-family:var(--mono);font-size:14px;font-weight:700;color:var(--t2)}
h1{font-family:var(--body);font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.subtitle{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.04em}
.hdr-right{display:flex;align-items:center;gap:20px}
.status-dots{display:flex;align-items:center;gap:16px}
.status-dot{display:flex;align-items:center;gap:6px}
.status-dot span{font-family:var(--mono);font-size:11px;color:var(--t2)}
.dot{display:inline-block;border-radius:50%;flex-shrink:0}
.dot-sm{width:10px;height:10px}
.dot-md{width:14px;height:14px}
.last-ts{font-family:var(--mono);font-size:10px;color:var(--t3)}
.refresh-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--card);color:var(--t2);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:14px;transition:all .2s}
.refresh-btn:hover{background:var(--card-h);border-color:var(--t3)}
.refresh-btn.spinning .icon{animation:spin 1s linear infinite}

/* Setup banner */
.setup-banner{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:32px;text-align:center;margin-top:24px}
.setup-banner h2{font-size:16px;font-weight:600;margin-bottom:12px}
.setup-banner p{font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.6}
.setup-banner a{color:var(--codex);text-decoration:none}
.setup-banner a:hover{text-decoration:underline}
.setup-banner .services{display:flex;justify-content:center;gap:24px;font-family:var(--mono);font-size:12px;color:var(--t2)}
.setup-banner .svc-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;opacity:.5}

/* Summary grid */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding-top:24px;margin-bottom:20px}
.s-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;
  transition:background .2s;min-width:0}
.s-card:hover{background:var(--card-h)}
.s-label{font-family:var(--body);font-size:10px;font-weight:500;text-transform:uppercase;
  letter-spacing:.08em;color:var(--t3);margin-bottom:8px}
.s-value{font-family:var(--mono);font-size:32px;font-weight:700;letter-spacing:-.04em;line-height:1;margin-bottom:6px}
.s-unit{font-size:18px;color:var(--t3);margin-left:2px}
.s-sub{font-family:var(--body);font-size:11px;color:var(--t2)}

/* Agent cards grid */
.agents-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.a-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;
  min-width:0;transition:all .2s}
.a-card:hover{background:var(--card-h)}
.a-card.offline{opacity:.6}
.a-accent{height:2px}
.a-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.a-name{display:flex;align-items:center;gap:10px}
.a-name-text{font-family:var(--body);font-size:16px;font-weight:600}
.a-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;
  letter-spacing:.04em;text-transform:uppercase}
.a-body{padding:0 20px 8px}
.a-error{padding:20px 0;text-align:center;color:var(--t3);font-family:var(--body);font-size:13px}
.a-error-icon{font-size:24px;margin-bottom:8px}
.a-footer{padding:10px 20px 14px;border-top:1px solid var(--border-s);font-family:var(--mono);font-size:11px;color:var(--t3)}

/* Usage bar */
.u-bar{margin-bottom:14px}
.u-bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.u-bar-label{font-family:var(--body);font-size:12px;color:var(--t2);letter-spacing:.02em;text-transform:uppercase}
.u-bar-vals{display:flex;align-items:baseline;gap:8px}
.u-bar-pct{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:-.02em}
.u-bar-reset{font-family:var(--mono);font-size:10px;color:var(--t3)}
.u-track{width:100%;height:6px;border-radius:3px;background:var(--bar-track);overflow:hidden}
.u-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.16,1,.3,1)}

/* Chart */
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:20px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.chart-title{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
.chart-sub{font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px;position:relative}
.chart-col{flex:1 1 0;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;position:relative}
.chart-bar{width:100%;max-width:32px;border-radius:3px 3px 1px 1px;transition:all .3s cubic-bezier(.16,1,.3,1);min-height:3px}
.chart-tooltip{position:absolute;z-index:10;background:var(--elevated);border:1px solid var(--border);
  border-radius:6px;padding:4px 8px;font-family:var(--mono);font-size:11px;white-space:nowrap;
  box-shadow:0 4px 12px rgba(0,0,0,.4);pointer-events:none}
.chart-labels{display:flex;gap:6px;margin-top:8px;padding:0 4px}
.chart-label{flex:1 1 0;text-align:center;font-family:var(--mono);font-size:8px;color:var(--t3);
  letter-spacing:-.02em;transition:color .2s}

/* Footer */
footer{padding:16px 0 32px;border-top:1px solid var(--border-s);display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:8px;font-family:var(--mono);font-size:10px;color:var(--t3)}
.ftr-status{color:var(--ok)}

/* Skeleton */
.skeleton{border-radius:8px;
  background:linear-gradient(90deg,var(--card) 25%,var(--card-h) 50%,var(--card) 75%);
  background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeInUp .4s cubic-bezier(.16,1,.3,1) forwards;opacity:0}
.d1{animation-delay:50ms}.d2{animation-delay:100ms}.d3{animation-delay:150ms}
.d4{animation-delay:200ms}.d5{animation-delay:250ms}.d6{animation-delay:300ms}

@media(max-width:768px){
  .summary-grid{grid-template-columns:1fr 1fr!important}
  .agents-grid{grid-template-columns:1fr!important}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="container">

  <!-- Header -->
  <header class="fade-in d1">
    <div class="hdr-left">
      <div class="logo">&#x25A3;</div>
      <div>
        <h1>Agent Stats</h1>
        <span class="subtitle">USAGE MONITOR</span>
      </div>
    </div>
    <div class="hdr-right">
      <div class="status-dots" id="statusDots"></div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="last-ts" id="lastTs"></span>
        <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
          <span class="icon">&#x21BB;</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main id="content">
    <div id="loading" style="padding-top:32px">
      <div class="summary-grid">
        <div class="skeleton" style="height:100px"></div>
        <div class="skeleton" style="height:100px"></div>
        <div class="skeleton" style="height:100px"></div>
        <div class="skeleton" style="height:100px"></div>
      </div>
      <div class="agents-grid" style="margin-top:12px">
        <div class="skeleton" style="height:200px"></div>
        <div class="skeleton" style="height:200px"></div>
        <div class="skeleton" style="height:200px"></div>
        <div class="skeleton" style="height:200px"></div>
      </div>
    </div>
  </main>

  <footer class="fade-in d6">
    <span id="footerInfo">Agent Stats v0.1</span>
    <span class="ftr-status" id="footerStatus"></span>
  </footer>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// State & config
// ═══════════════════════════════════════════════════════════════
let state = null;
let pollTimer = null;
let firstRender = true;

const AGENTS = ['codex', 'kimi', 'claude', 'zai'];
const NAMES = { codex: 'Codex', kimi: 'Kimi', claude: 'Claude', zai: 'Z' };
const COLORS = {
  codex: { solid: '#06b6d4', muted: 'rgba(6,182,212,0.15)', dimmed: 'rgba(6,182,212,0.3)' },
  kimi:  { solid: '#f97316', muted: 'rgba(249,115,22,0.15)', dimmed: 'rgba(249,115,22,0.3)' },
  claude:{ solid: '#d4a06e', muted: 'rgba(212,160,110,0.15)', dimmed: 'rgba(212,160,110,0.3)' },
  zai:   { solid: '#a855f7', muted: 'rgba(168,85,247,0.15)', dimmed: 'rgba(168,85,247,0.3)' },
};
const STATUS_COLORS = {
  ok: '#22c55e', warn: '#f59e0b', critical: '#ef4444',
  error: '#ef4444', offline: '#6b7280', stale: '#8b5cf6',
};
const STATUS_ICONS = { ok: '\u2713', warn: '\u25B3', critical: '\u2715', error: '\u2715', offline: '\u25CB', stale: '\u25F7' };

// ═══════════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════════
function esc(s) { if (s == null) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function statusFromPct(p) { return p > 70 ? 'critical' : p >= 40 ? 'warn' : 'ok'; }
function statusColor(s) { return STATUS_COLORS[s] || STATUS_COLORS.offline; }

function remainingSec(field) {
  if (!field) return null;
  if (field.reset_at) {
    const ms = new Date(field.reset_at).getTime() - Date.now();
    return Math.max(0, Math.round(ms / 1000));
  }
  return field.remaining_seconds ?? null;
}

function fmtReset(sec) {
  if (sec == null || sec <= 0) return '';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  if (h > 0) return `\u21BB in ${h}h ${m}m`;
  return `\u21BB in ${m}m`;
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function dotHtml(agent, status, size) {
  const c = COLORS[agent];
  const off = status === 'offline' || status === 'error';
  const fill = off ? c.dimmed : c.solid;
  const s = size === 'sm' ? 10 : 14;
  const glow = off ? '' : `box-shadow:0 0 ${s}px ${fill}40;`;
  const pulse = (!off && status === 'ok') ? 'animation:pulse 2s ease-in-out infinite;' : '';
  return `<span class="dot dot-${size}" style="background:${fill};${glow}${pulse}"></span>`;
}

// ═══════════════════════════════════════════════════════════════
// Data fetching
// ═══════════════════════════════════════════════════════════════
async function fetchData() {
  try {
    const r = await fetch('/api/data');
    state = await r.json();
    render();
    schedulePoll();
  } catch (e) {
    console.error('Fetch failed:', e);
    schedulePoll();
  }
}

async function manualRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    const r = await fetch('/api/refresh');
    state = await r.json();
    render();
    schedulePoll();
  } catch (e) {
    console.error('Refresh failed:', e);
  }
  btn.classList.remove('spinning');
}

function schedulePoll() {
  if (pollTimer) clearTimeout(pollTimer);
  let delay = 30000;
  if (state && state.next_refresh_at) {
    const ms = new Date(state.next_refresh_at).getTime() - Date.now() + 2000;
    delay = Math.max(10000, Math.min(ms, 300000));
  }
  pollTimer = setTimeout(fetchData, delay);
}

// ═══════════════════════════════════════════════════════════════
// Render
// ═══════════════════════════════════════════════════════════════
function render() {
  if (!state) return;

  // Check if any agent has data
  const agents = AGENTS.map(id => state[id]).filter(Boolean);
  const hasAny = agents.some(a => a.status === 'ok' || a.status === 'stale');

  // Status dots in header
  document.getElementById('statusDots').innerHTML = AGENTS.map(id => {
    const a = state[id];
    if (!a) return '';
    return `<div class="status-dot">${dotHtml(id, a.status, 'sm')}<span>${NAMES[id]}</span></div>`;
  }).join('');

  // Last refresh timestamp
  document.getElementById('lastTs').textContent = fmtTime(state.last_fetch);

  // Footer
  document.getElementById('footerInfo').textContent =
    `Agent Stats v0.1 \u00B7 ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  const okCount = agents.filter(a => a.status === 'ok').length;
  document.getElementById('footerStatus').textContent = okCount > 0 ? `\u25CF ${okCount}/${AGENTS.length} connected` : '\u25CB disconnected';
  document.getElementById('footerStatus').style.color = okCount > 0 ? '#22c55e' : '#6b7280';

  // Compute summary values
  const sessionVals = [], weeklyVals = [];
  AGENTS.forEach(id => {
    const a = state[id];
    if (!a || a.status === 'offline' || a.status === 'error') return;
    if (a.session) sessionVals.push(a.session.usage_pct || 0);
    if (a.weekly) weeklyVals.push(a.weekly.usage_pct || 0);
  });
  const avg = arr => arr.length ? Math.round(arr.reduce((s, v) => s + v, 0) / arr.length) : 0;
  const sessionAvg = avg(sessionVals);
  const weeklyAvg = avg(weeklyVals);
  const health = 100 - weeklyAvg;
  const activeCount = agents.filter(a => a.status !== 'offline' && a.status !== 'error').length;

  let html = '';

  // Setup banner when no agents connected
  if (!hasAny) {
    html += renderSetup();
  }

  const anim = firstRender ? 'fade-in' : '';

  // Summary cards (always shown)
  html += `<div class="summary-grid ${anim} d2">`;
  html += summaryCard('Session Avg', sessionAvg, '%', 'Across all agents', statusFromPct(sessionAvg));
  html += summaryCard('Weekly Avg', weeklyAvg, '%', '7-day rolling', statusFromPct(weeklyAvg));
  html += summaryCard('Health', health, '%', 'System headroom', statusFromPct(100 - health));
  html += summaryCard('Active', activeCount, `/ ${AGENTS.length}`, 'Agents connected', null);
  html += `</div>`;

  // Agent cards (always shown)
  html += `<div class="agents-grid ${anim} d4">`;
  AGENTS.forEach(id => { html += agentCard(id, state[id] || {status:'offline',error:'No data yet'}); });
  html += `</div>`;

  // Chart (Codex daily breakdown)
  const codex = state.codex;
  if (codex && codex.daily_breakdown && codex.daily_breakdown.length > 0) {
    html += `<div class="${anim} d5">${renderChart(codex.daily_breakdown)}</div>`;
  }

  document.getElementById('content').innerHTML = html;
  bindChartEvents();
  firstRender = false;
}

// ═══════════════════════════════════════════════════════════════
// Component renderers
// ═══════════════════════════════════════════════════════════════
function renderSetup() {
  return `
    <div class="setup-banner">
      <h2>Waiting for data&hellip;</h2>
      <p>Open <a href="//${location.hostname}:5800" target="_blank">Firefox GUI (:5800)</a> and log in to all services:</p>
      <div class="services">
        <span><span class="svc-dot" style="background:var(--codex)"></span>chatgpt.com</span>
        <span><span class="svc-dot" style="background:var(--kimi)"></span>kimi.com</span>
        <span><span class="svc-dot" style="background:var(--claude)"></span>claude.ai</span>
        <span><span class="svc-dot" style="background:var(--zai)"></span>z.ai</span>
      </div>
    </div>`;
}

function summaryCard(label, value, unit, sub, status) {
  const color = status ? statusColor(status) : 'var(--t1)';
  return `
    <div class="s-card">
      <div class="s-label">${label}</div>
      <div class="s-value" style="color:${color}">${value}<span class="s-unit">${unit}</span></div>
      <div class="s-sub">${sub}</div>
    </div>`;
}

function agentCard(id, data) {
  if (!data) return '';
  const c = COLORS[id];
  const isErr = data.status === 'error' || data.status === 'offline';
  const isStale = data.status === 'stale';
  const cls = isErr ? ' offline' : '';

  let accent = isErr ? 'var(--off)' : c.solid;
  let accentOp = isErr ? '0.3' : '0.6';

  let body = '';
  if (isErr) {
    const msg = data.status === 'offline' ? 'Agent offline \u2014 log in to connect' : 'Auth failed \u2014 reconnect needed';
    body = `<div class="a-error"><div class="a-error-icon">\u26A0</div>${esc(msg)}</div>`;
  } else {
    const sessionSec = remainingSec(data.session);
    const weeklySec = remainingSec(data.weekly);
    body = usageBar('Session usage', data.session?.usage_pct || 0, sessionSec);
    body += usageBar('Weekly usage', data.weekly?.usage_pct || 0, weeklySec);
    if (isStale) {
      body += `<div style="font-family:var(--mono);font-size:10px;color:var(--stale);margin-top:4px">\u25F7 Data may be stale: ${esc(data.error || 'fetch failed')}</div>`;
    }
  }

  let footer = '';
  if (data.credits && !isErr) {
    const bal = data.credits.balance != null ? data.credits.balance : '';
    const txt = data.credits.has_credits ? `\u2B21 ${bal} credits` : '';
    if (txt) footer = `<div class="a-footer">${txt}</div>`;
  }
  if (id === 'kimi' && data.weekly && !isErr) {
    footer = `<div class="a-footer">\u2B21 ${data.weekly.used || 0} / ${data.weekly.limit || '?'} weekly requests</div>`;
  }
  if (id === 'claude' && data.models && !isErr) {
    const s = data.models.sonnet || 0;
    const o = data.models.opus || 0;
    if (s > 0 || o > 0) {
      footer = `<div class="a-footer">\u2B21 Sonnet ${s}% \u00B7 Opus ${o}%</div>`;
    }
  }
  if (id === 'zai' && data.limits_detail && data.limits_detail.length > 0 && !isErr) {
    const parts = data.limits_detail.map(l => `${esc(l.name)}: ${esc(l.used)}/${esc(l.total)}`).join(' \u00B7 ');
    footer = `<div class="a-footer">\u2B21 ${parts}</div>`;
  }

  const statusIcon = STATUS_ICONS[data.status] || '?';
  const statusClr = statusColor(data.status);
  const plan = esc(data.plan || '?');

  return `
    <div class="a-card${cls}">
      <div class="a-accent" style="background:${accent};opacity:${accentOp}"></div>
      <div class="a-header">
        <div class="a-name">
          ${dotHtml(id, data.status, 'md')}
          <span class="a-name-text">${NAMES[id]}</span>
          <span style="font-family:var(--mono);font-size:12px;color:${statusClr}">${statusIcon}</span>
        </div>
        <span class="a-badge" style="color:${c.solid};background:${c.muted}">${plan}</span>
      </div>
      <div class="a-body">${body}</div>
      ${footer}
    </div>`;
}

function usageBar(label, pct, resetSec) {
  pct = Math.round(pct * 10) / 10;
  const status = statusFromPct(pct);
  const color = statusColor(status);
  const resetTxt = fmtReset(resetSec);
  return `
    <div class="u-bar">
      <div class="u-bar-top">
        <span class="u-bar-label">${label}</span>
        <div class="u-bar-vals">
          <span class="u-bar-pct" style="color:${color}">${pct}%</span>
          ${resetTxt ? `<span class="u-bar-reset">${resetTxt}</span>` : ''}
        </div>
      </div>
      <div class="u-track">
        <div class="u-fill" style="width:${Math.min(pct,100)}%;background:${color};box-shadow:0 0 8px ${color}30"></div>
      </div>
    </div>`;
}

function renderChart(data) {
  // Normalize: accept array of numbers or objects with value/percentage key
  const points = data.slice(-14).map((d, i) => {
    if (typeof d === 'number') return { day: `${i + 1}`, value: d };
    if (d.value != null) return { day: d.day || d.date || `${i + 1}`, value: d.value };
    if (d.percentage != null) return { day: d.day || d.date || `${i + 1}`, value: d.percentage };
    return { day: `${i + 1}`, value: 0 };
  });

  if (!points.length) return '';
  const max = Math.max(...points.map(p => p.value), 1);

  let bars = '', labels = '';
  points.forEach((p, i) => {
    const hPct = (p.value / max) * 100;
    const st = statusFromPct(p.value);
    const clr = statusColor(st);
    bars += `
      <div class="chart-col" data-idx="${i}">
        <div class="chart-tooltip" style="display:none;bottom:calc(${hPct}% + 24px);color:${clr}">${p.value}%</div>
        <div class="chart-bar" style="height:${hPct}%;background:${clr}80"></div>
      </div>`;
    const short = String(p.day).split(' ')[0];
    labels += `<div class="chart-label" data-idx="${i}">${short}</div>`;
  });

  return `
    <div class="chart-box">
      <div class="chart-header">
        <div class="chart-title">${dotHtml('codex','ok','sm')} Codex \u2014 Daily Usage</div>
        <span class="chart-sub">Last ${points.length} days</span>
      </div>
      <div class="chart-bars" id="chartBars">${bars}</div>
      <div class="chart-labels" id="chartLabels">${labels}</div>
    </div>`;
}

function bindChartEvents() {
  const bars = document.getElementById('chartBars');
  if (!bars) return;
  bars.addEventListener('mouseover', e => {
    const col = e.target.closest('.chart-col');
    if (!col) return;
    const tip = col.querySelector('.chart-tooltip');
    const bar = col.querySelector('.chart-bar');
    if (tip) tip.style.display = 'block';
    if (bar) {
      bar.style.background = bar.style.background.replace('80', '');
      bar.style.boxShadow = `0 0 12px ${statusColor(statusFromPct(parseFloat(col.querySelector('.chart-tooltip')?.textContent)))}30`;
    }
  });
  bars.addEventListener('mouseout', e => {
    const col = e.target.closest('.chart-col');
    if (!col) return;
    const tip = col.querySelector('.chart-tooltip');
    const bar = col.querySelector('.chart-bar');
    if (tip) tip.style.display = 'none';
    if (bar) {
      const clr = bar.style.background.replace(/[^#\w]/g, '');
      bar.style.background = statusColor(statusFromPct(parseFloat(col.querySelector('.chart-tooltip')?.textContent))) + '80';
      bar.style.boxShadow = 'none';
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════
fetchData();
// Update countdowns every 60s
setInterval(() => { if (state) render(); }, 60000);
</script>
